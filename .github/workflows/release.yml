name: Build cross-platform releases

# Builds the macOS (.app) and Linux (binary) standalone apps.
# - On a tag push (v*) the artifacts are attached to that tag's GitHub release.
# - "Run workflow" (workflow_dispatch) builds and uploads them as run artifacts
#   so you can test the builds without cutting a release.
#
# Windows builds (Rough Cut.exe, the portable zip, and the installer) are produced
# locally with the Build-*.bat scripts and are not part of this workflow.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    name: macOS (arm64)
    runs-on: macos-14      # Apple Silicon
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller python-mpv

      - name: Generate .icns icon (best-effort)
        continue-on-error: true
        run: |
          set -e
          brew install librsvg || true
          if command -v rsvg-convert >/dev/null 2>&1; then
            rsvg-convert -w 1024 -h 1024 Rough Cut-icon.svg -o icon_1024.png
            mkdir -p Rough Cut.iconset
            for s in 16 32 128 256 512; do
              sips -z $s $s icon_1024.png --out "Rough Cut.iconset/icon_${s}x${s}.png"
              d=$((s * 2))
              sips -z $d $d icon_1024.png --out "Rough Cut.iconset/icon_${s}x${s}@2x.png"
            done
            iconutil -c icns Rough Cut.iconset -o Rough Cut.icns || true
          fi

      - name: Build .app
        run: |
          ICON=""
          [ -f Rough Cut.icns ] && ICON="--icon Rough Cut.icns"
          pyinstaller --noconfirm --windowed --name Rough Cut $ICON --hidden-import mpv Rough Cut.py

      - name: Package (zip the .app)
        run: |
          cd dist
          ditto -c -k --keepParent Rough Cut.app "Rough Cut-macOS-arm64.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: Rough Cut-macOS-arm64
          path: dist/Rough Cut-macOS-arm64.zip

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Rough Cut-macOS-arm64.zip

  linux:
    name: Linux (x86_64)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verify tkinter is available
        run: python -c "import tkinter; print('Tk', tkinter.TkVersion)"

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller python-mpv

      - name: Build binary
        run: pyinstaller --noconfirm --onefile --windowed --name Rough Cut --hidden-import mpv Rough Cut.py

      - name: Package (tarball)
        run: |
          mkdir -p pkg/Rough Cut
          cp dist/Rough Cut pkg/Rough Cut/Rough Cut
          chmod +x pkg/Rough Cut/Rough Cut
          cp LICENSE pkg/Rough Cut/LICENSE.txt
          cp THIRD_PARTY_NOTICES.md pkg/Rough Cut/THIRD_PARTY_NOTICES.txt
          cp packaging/README-linux.txt pkg/Rough Cut/README.txt
          cp Rough Cut-icon.svg pkg/Rough Cut/Rough Cut-icon.svg || true
          tar -C pkg -czf Rough Cut-linux-x86_64.tar.gz Rough Cut

      - uses: actions/upload-artifact@v4
        with:
          name: Rough Cut-linux-x86_64
          path: Rough Cut-linux-x86_64.tar.gz

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: Rough Cut-linux-x86_64.tar.gz
